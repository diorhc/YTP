name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run weekly security scan on Sundays at 3 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    env:
      HUSKY: '0'
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    permissions:
      contents: read
      security-events: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint security rules
        run: npm run lint
        continue-on-error: true

      - name: Run CSP compatibility check
        run: npm run lint:csp

      - name: Check for known vulnerabilities (non-blocking)
        run: |
          set +e
          npm audit --audit-level=moderate
          AUDIT_EXIT=$?
          set -e
          if [ $AUDIT_EXIT -ne 0 ]; then
            echo "⚠️ npm audit found vulnerabilities (non-blocking in security scan workflow)"
          else
            echo "✅ npm audit passed"
          fi

      - name: Security code patterns check
        run: |
          echo "Checking for dangerous patterns..."
          npm run lint:csp

          if grep -rE "innerHTML\s*=\s*[^'\"\`]" src/ --include="*.js" | grep -v "innerHTML = ''" | grep -v "createSafeHTML" | grep -v "//"; then
            echo "⚠️ WARNING: Potentially unsafe innerHTML usage found"
            echo "Use YouTubeSecurityUtils.setInnerHTMLSafe() instead"
          else
            echo "✅ innerHTML usage is safe"
          fi

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for potential secrets..."
          FOUND_SECRETS=0
          
          # Check for API keys
          if grep -r "api[_-]key\s*=\s*['\"]" src/ --include="*.js" -i 2>/dev/null; then
            echo "⚠️ WARNING: Potential API key found"
            FOUND_SECRETS=1
          fi
          
          # Check for tokens
          if grep -r "token\s*=\s*['\"][a-zA-Z0-9]{20,}" src/ --include="*.js" -i 2>/dev/null; then
            echo "⚠️ WARNING: Potential token found"
            FOUND_SECRETS=1
          fi
          
          if [ $FOUND_SECRETS -eq 0 ]; then
            echo "✅ Secret check passed"
          else
            echo "⚠️ Potential secrets found (non-blocking)"
          fi

      - name: Validate security utilities exist
        run: |
          if [ ! -f "src/safe-dom.js" ]; then
            echo "❌ ERROR: safe-dom.js not found"
            exit 1
          fi
          
          echo "✅ Security utilities validated"

      - name: Generate security report
        if: always()
        run: |
          echo "# Security Scan Report" > security-report.md
          echo "" >> security-report.md
          echo "**Date**: $(date)" >> security-report.md
          echo "**Commit**: ${{ github.sha }}" >> security-report.md
          echo "" >> security-report.md
          echo "## Scan Results" >> security-report.md
          echo "" >> security-report.md
          echo "- ESLint: See job output" >> security-report.md
          echo "- NPM Audit: See job output" >> security-report.md
          echo "- Pattern Analysis: See job output" >> security-report.md
          echo "- Secret Detection: See job output" >> security-report.md

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: security-report
          path: security-report.md
          retention-days: 30

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      HUSKY: '0'
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    permissions:
      contents: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD
