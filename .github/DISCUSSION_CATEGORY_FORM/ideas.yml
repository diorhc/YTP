body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request
        Suggest a new feature or improvement for YouTube+.
  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: "What area does this feature relate to?"
      options:
        - Player (PIP, zoom, speed, etc.)
        - Download (video, audio, subtitles)
        - UI/UX (settings, appearance, themes)
        - Shorts
        - YouTube Music
        - Comments
        - Statistics
        - Performance
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: "What problem does this feature solve?"
      placeholder: "I'm always frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: "How would you like this to work?"
      placeholder: "I would like YouTube+ to..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: "Any alternative solutions you've thought of"
      placeholder: "I also considered..."
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Importance
      description: "How important is this feature to you?"
      options:
        - Nice to have
        - Important
        - Critical (blocking my usage)
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: "Screenshots, examples, or related issues"
      placeholder: "Any additional information..."
    validations:
      required: false
